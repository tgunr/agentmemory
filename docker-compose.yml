      AGENTMEMORY_URL: "http://localhost:3111"
      AGENTMEMORY_SECRET: "CHANGE_ME_RUN_AGENTMEMORY_INIT"
      AGENTMEMORY_TOOLS: "all"
      AGENTMEMORY_AUTO_COMPRESS: "false"
      AGENTMEMORY_REFLECT: "false"
      AGENTMEMORY_SLOTS: "false"
      AGENTMEMORY_INJECT_CONTEXT: "false"
      GRAPH_EXTRACTION_ENABLED: "false"
      CONSOLIDATION_ENABLED: "true"
      LESSON_DECAY_ENABLED: "true"
      OPENAI_API_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJlbnYiOiJwcm9kdWN0aW9uIiwia2lsb1VzZXJJZCI6ImFhMzZlMDdhLThiMWQtNDJhZC1iMGEwLWZhYTIyYzFmM2QxZiIsImFwaVRva2VuUGVwcGVyIjpudWxsLCJ2ZXJzaW9uIjozLCJpYXQiOjE3NTY5MzAzODAsImV4cCI6MTkxNDcxODM4MH0.tT5TKkGCiRkWDIy5w1vuo-MjLrxDEb3ykb1OpVhQMIU"
      OPENAI_BASE_URL: "https://routellm.abacus.ai/v1"
      OPENAI_MODEL: "kilo/kilo-auto/balanced"
      OPENAI_EMBEDDING_MODEL: "text-embedding-3-small"
      EMBEDDING_PROVIDER: "openai"
      BM25_WEIGHT: "0.4"
      VECTOR_WEIGHT: "0.6"
      TOKEN_BUDGET: "2000"
    volumes:
      - /alpha/data/agentmemory:/agentmemory-data:rw
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
