      dockerfile: deploy/singleton/Dockerfile
    ports:
      - "0.0.0.0:3111:3111"
      - "0.0.0.0:3112:3112"
      - "0.0.0.0:3113:3113"
      - "0.0.0.0:3001:3001"
      - "0.0.0.0:49134:49134"
